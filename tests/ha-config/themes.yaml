# HA theme definitions used by UIX visual tests.
#
# Each theme is available via the ``frontend.set_theme`` service call and
# is referenced by the ``theme:`` key in a scenario YAML file.

uix-test-theme:
  uix-theme: uix-test-theme
  uix-card: |
    ha-card {
      background: rgb(0, 0, 128) !important;
      color: white !important;
    }

# ---------------------------------------------------------------------------
# Documentation image themes — used by scenarios under
# tests/visual/scenarios/doc-images/ to generate the page-asset PNGs
# referenced in docs/source/using/themes.md.
# ---------------------------------------------------------------------------

uix-doc-red-basic:
  uix-theme: uix-doc-red-basic
  primary-color: red
  ha-card-border-radius: 20px

uix-doc-red-border:
  uix-theme: uix-doc-red-border
  primary-color: red
  ha-card-border-radius: 20px
  uix-row: |
    :host {
      display: block;
      border: 1px solid black;
    }

uix-doc-red-template:
  uix-theme: uix-doc-red-template
  primary-color: red
  ha-card-border-radius: 20px
  uix-row: |
    :host {
      display: block;
      border: 1px solid {% if is_state(config.entity, 'on') %} red {% else %} black {% endif %};
    }

uix-test-view-bg-image:
  uix-theme: uix-test-view-bg-image
  uix-drawer: |
    :host {
      --uix-view-background-image: /local/media/person-grey.png;
    }

uix-test-view-bg-shorthand:
  uix-theme: uix-test-view-bg-shorthand
  uix-drawer: |
    :host {
      --uix-view-background: linear-gradient(135deg, teal 0%, purple 100%);
    }

uix-doc-red-classes:
  uix-theme: uix-doc-red-classes
  primary-color: red
  ha-card-border-radius: 20px
  uix-row: |
    :host {
      display: block;
      border: 1px solid {% if is_state(config.entity, 'on') %} red {% else %} black {% endif %};
    }
    :host(.teal) {
      background: teal;
    }
    :host(.purple) {
      background: purple;
    }

uix-date-picker-selection:
  uix-theme: uix-date-picker-selection

  uix-dialog-yaml: |
    "&.type-dialog-date-picker": |
      calendar-month::part(range-inner),
      calendar-month::part(range-start),
      calendar-month::part(range-end),
      calendar-month::part(selected),
      calendar-month::part(selected):hover,
      calendar-month:not(.dummy)::part(button selected):hover {
        background-color: red !important;
      }
      calendar-month::part(button):hover {
        background-color: rgba(255, 0, 0, 0.2) !important;
      }

uix-card-as-badge:
  uix-theme: uix-card-as-badge

  uix-card-as-badge-yaml: |
    .: |
      :host {
        --ha-tile-info-primary-font-size: var(--ha-font-size-s);
        --ha-card-border-radius: var(--ha-badge-border-radius, calc(var(--ha-badge-size, 36px) / 2));
      }
    hui-home-summary-card $: |
      ha-tile-container {
        line-height: 0;
      }
      ha-tile-icon {
        --mdc-icon-size: 18px;
        --tile-icon-size: 18px;
      }
    hui-home-summary-card $ ha-tile-info $: |
      div.info {
        flex-direction: row;
        align-items: center;
        gap: var(--ha-space-2);
      }
      div.info slot.primary span,
      div.info slot.secondary span {
          overflow: visible;
        }
    hui-home-summary-card $$ ha-tile-container $: |
      .container {
        margin: 0;
      }
      .content {
        gap: var(--ha-space-2);
        padding: 8px 10px;
      }

uix-theme-foundry-sparks:
  uix-theme: uix-theme-foundry-sparks
  uix-card-foundry: uix-test-theme-foundry-sparks
