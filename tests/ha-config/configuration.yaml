homeassistant:
  country: US
  unit_system: metric
  time_zone: UTC
  customize: !include customize.yaml
  media_dirs:
    local: /config/www/media

default_config:

demo:

lovelace:
  mode: storage
  resource_mode: yaml
  resources: !include lovelace_resources.yaml

frontend:
  themes: !include themes.yaml

input_boolean:
  test_boolean:
    name: Test Boolean
    initial: off

person:
  - name: James Bond 007
    id: james_bond007

light:
  - platform: group
    name: "All Lights"
    entities:
      - light.bed_light
      - light.ceiling_lights
      - light.kitchen_lights
      - light.living_room_rgbww_lights
      - light.office_rgbw_lights
      - light.entrance_color_white_lights