id: express_search_selector
description: >
  The $$ express deep-search selector navigates through shadow-root boundaries
  as a mid-path separator.  ha-tile-icon lives inside ha-card's shadow root —
  a boundary that a plain selector cannot cross.  Using "ha-card $$ ha-tile-icon $"
  (mid-selector form) reaches it: ha-card is found shallowly, then $$ performs a
  recursive shadow-piercing search for ha-tile-icon inside it, and finally $ enters
  ha-tile-icon's own shadow root to apply color: rgb(255, 0, 0) on :host.
view_path: express-search-selector

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light
      brightness: 181

card:
  type: tile
  entity: light.bed_light
  uix:
    style:
      "ha-card $$ ha-tile-icon $": |
        :host {
          color: rgb(255, 0, 0);
        }

assertions:
  # ha-tile-icon sits inside ha-card's shadow root.  $$ crosses that extra
  # shadow boundary — exactly what the mid-selector form is designed for.
  - type: css_property
    root:
      - hui-tile-card
      - ha-card
    selector: ha-tile-icon
    property: color
    expected: "rgb(255, 0, 0)"

  - type: snapshot
    name: "11_express_search_selector"
    threshold: 0.02
