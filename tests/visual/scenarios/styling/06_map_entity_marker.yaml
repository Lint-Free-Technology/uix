id: map_entity_marker
description: "UIX injects a uix-node and styling for map entity marker"
view_path: map-entity-marker

# Create a static device tracker with a fixed GPS location before the page
# loads so the map marker position is deterministic across test runs.
setup:
  - type: ha_service
    domain: device_tracker
    service: see
    data:
      dev_id: uix_test_person
      gps:
        - 51.5074
        - -0.1278
      gps_accuracy: 1
  - type: wait
    ms: 2000

card:
  type: map
  entities:
    - entity: device_tracker.uix_test_person
      uix:
        style: |
          div.marker {
            border-color: red !important;
            border-width: 5px;
          }
  theme_mode: auto

assertions:
  - type: element_present
    root: "hui-map-card"
    selector: "uix-node"

  - type: css_property
    root: "ha-entity-marker"
    selector: "div.marker"
    property: "borderColor"
    expected: "rgb(255, 0, 0)"

  - type: snapshot
    name: "06_map_entity_marker"
    threshold: 0.02