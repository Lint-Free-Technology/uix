id: card_basic_style
description: "UIX injects a uix-node and a background-color style onto an entities card"
view_path: card-basic-style

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light
      brightness: 181

card:
  type: entities
  title: "UIX Red Background"
  entities:
    - light.bed_light
  uix:
    style: "ha-card { background: rgb(255, 0, 0); }"

assertions:
  - type: element_present
    root: "hui-entities-card"
    selector: "uix-node"

  - type: css_property
    root: "hui-entities-card"
    selector: "ha-card"
    property: "backgroundColor"
    expected: "rgb(255, 0, 0)"

  - type: snapshot
    name: "01_card_basic_style"
    threshold: 0.02
