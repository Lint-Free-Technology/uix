id: theme_foundry_sparks
description: "A theme can apply sparks from a foundry to a normal card without wrapping it in uix-forge"
view_path: theme-foundry-sparks
theme: uix-theme-foundry-sparks

setup:
  - type: add_foundry
    name: uix-test-theme-foundry-sparks
    config:
      forge:
        sparks:
          - type: background
            for: ha-card
            background:
              color: "rgb(220, 53, 69)"
            dissolve_target:
              - background: "none"
            class: uix-test-theme-foundry-background

card:
  type: tile
  entity: light.bed_light
  name: "Theme foundry sparks"

assertions:
  - type: element_present
    root: "ha-card"
    selector: "[data-uix-spark-bg-id]"

  - type: element_present
    root: "ha-card"
    selector: "[data-uix-spark-bg-id].uix-test-theme-foundry-background"

  - type: css_property
    root: "ha-card"
    selector: "[data-uix-spark-bg-id] div"
    property: "backgroundColor"
    expected: "rgb(220, 53, 69)"

teardown:
  - type: delete_foundry
    name: uix-test-theme-foundry-sparks
