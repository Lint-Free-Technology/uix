id: forge_tooltip
description: "Tooltip spark attaches a wa-tooltip containing the configured text"
view_path: forge-tooltip

setup:
  - type: ha_service
    domain: light
    service: turn_on
    entity_id: light.bed_light
    brightness: 181

card:
  type: "custom:uix-forge"
  forge:
    mold: card
    sparks:
      - type: tooltip
        for: hui-tile-card
        content: "This is a UIX tooltip"
  element:
    type: tile
    entity: "light.bed_light"

# Hover the forge card to trigger the tooltip before taking the snapshot.
interactions:
  - type: hover
    selector: uix-forge
    settle_ms: 800

assertions:
  - type: element_present
    root: uix-forge
    selector: wa-tooltip

  # wa-tooltip.textContent includes UIX-injected scoped CSS after the user
  # text, so we check it starts with the configured content.
  - type: text_startswith
    root: uix-forge
    selector: wa-tooltip
    expected: "This is a UIX tooltip"

  # Snapshot is taken after hover so the tooltip is visible.
  - type: snapshot
    name: "04_forge_tooltip_spark"
    threshold: 0.02
