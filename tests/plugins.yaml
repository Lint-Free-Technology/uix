# Third-party Lovelace plugins to download on every HA instance startup.
#
# Each entry requires:
#   repo     - GitHub repository in "owner/name" format
#   asset    - name of the JS asset to download from the latest release
#   filename - filename to write inside www/ (usually the same as `asset`)
#
# Resolution order: release asset → repo root → dist/ folder.

- repo: Lint-Free-Technology/lovelace-auto-entities
  asset: auto-entities.js
  filename: auto-entities.js

- repo: Nerwyn/custom-card-features
  asset: custom-card-features.js
  filename: custom-card-features.js
