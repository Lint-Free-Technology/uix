title: Forge Grid Spark
cards:
  - type: markdown
    content: |
      ## Grid Spark
      The `grid` spark applies CSS Grid layout to a container element.

  - type: markdown
    content: |
      ### `columns: 3` shorthand (repeat(3, 1fr))
  - type: custom:uix-forge
    forge:
      mold: card
      sparks:
        - type: grid
          columns: 3
          gap: 8
    element:
      type: grid
      cards:
        - type: tile
          entity: light.bed_light
        - type: tile
          entity: light.ceiling_lights
        - type: tile
          entity: light.kitchen_lights

  - type: markdown
    content: |
      ### Custom column widths string
  - type: custom:uix-forge
    forge:
      mold: card
      sparks:
        - type: grid
          columns: "1fr 2fr 1fr"
          gap: 8
    element:
      type: grid
      cards:
        - type: tile
          entity: light.bed_light
        - type: tile
          entity: light.ceiling_lights
        - type: tile
          entity: light.kitchen_lights

  - type: markdown
    content: |
      ### Auto-flow dense with auto_rows
  - type: custom:uix-forge
    forge:
      mold: card
      sparks:
        - type: grid
          columns: 3
          auto_rows: "minmax(80px, auto)"
          auto_flow: row dense
          gap: 8
    element:
      type: grid
      cards:
        - type: tile
          entity: light.bed_light
        - type: tile
          entity: light.ceiling_lights
        - type: tile
          entity: light.kitchen_lights

  - type: markdown
    content: |
      ### Responsive with media_queries (1 → 2 → 3 columns)
  - type: custom:uix-forge
    forge:
      mold: card
      sparks:
        - type: grid
          columns: 1
          gap: 8
          media_queries:
            - query: "(min-width: 600px)"
              columns: 2
            - query: "(min-width: 900px)"
              columns: 3
              gap: 16
    element:
      type: grid
      cards:
        - type: tile
          entity: light.bed_light
        - type: tile
          entity: light.ceiling_lights
        - type: tile
          entity: light.kitchen_lights

  - type: markdown
    content: |
      ### Template areas with elements
  - type: custom:uix-forge
    forge:
      mold: card
      sparks:
        - type: grid
          columns: 2
          gap: 8
          areas: '"header header" "main sidebar"'
          elements:
            - header
            - main
            - sidebar
    element:
      type: grid
      cards:
        - type: markdown
          content: "**Header** (spans full width)"
        - type: tile
          entity: light.bed_light
        - type: tile
          entity: light.ceiling_lights

  - type: markdown
    content: |
      ### Responsive template areas (stacked → side-by-side)
  - type: custom:uix-forge
    forge:
      mold: card
      sparks:
        - type: grid
          columns: 1
          gap: 8
          areas: '"header" "main" "sidebar"'
          elements:
            - header
            - main
            - sidebar
          media_queries:
            - query: "(min-width: 768px)"
              columns: 2
              areas: '"header header" "main sidebar"'
    element:
      type: grid
      cards:
        - type: markdown
          content: "**Header** (responsive)"
        - type: tile
          entity: light.bed_light
        - type: tile
          entity: light.ceiling_lights
