{% extends "base.html" %}

{% block extrahead %}
    <meta property="og:image" content="/assets/images/social@2x.png" />
    <meta property="og:type" content="object" />
    {% if page and page.meta and page.meta.description %}
        <meta property="og:description" content="{{ page.meta.description }}" />

    <meta property="og:description" content="💡 UI eXtension 💡 Add CSS styles to (almost) any part of the Home Assistant UI." />
    {% endif %}
{% endblock %}
