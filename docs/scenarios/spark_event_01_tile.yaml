id: doc_spark_event_tile
description: "Doc image: Forge Event spark changing tile entity (event.md)"
view_path: doc-spark-event-tile

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light
      brightness: 255
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.living_room_rgbww_lights
      brightness: 255

cards:
  - type: button
    name: Living Room
    tap_action:
      action: fire-dom-event
      uix_forge:
        - forge_id: my_tile
          data:
            entity: light.living_room_rgbww_lights
  - type: button
    name: Bed Room
    tap_action:
      action: fire-dom-event
      uix_forge:
        - forge_id: my_tile
          data:
            entity: light.bed_light
  - type: custom:uix-forge
    forge:
      mold: card
      grid_options:
        rows: 1
        columns: full
      sparks:
        - type: event
          forge_id: my_tile
    element:
      type: tile
      entity: "{{ uixForge.event.entity | default('light.bed_light') }}"

assertions: []

doc_animation:
  output: docs/source/assets/page-assets/forge/sparks/event_tile.gif
  root: hui-grid-section
  padding: 16
  interval_ms: 66
  threshold: 0.02
  cursor: pointer
  segments:
    - frames: 14   # ~1 s
    - interactions:
        - type: hover
          root: 
            - div.card:nth-of-type(1) hui-button-card
          selector: ha-card
          settle_ms: 100
      frames: 7   # ~0.5 s
    - interactions:
        - type: click
          root: 
            - div.card:nth-of-type(1) hui-button-card
          selector: ha-card
          settle_ms: 50
      frames: 3   # ~0.2 s
      click_circle: true
    - frames: 14   # ~1 s
    - interactions:
        - type: hover
          root: 
            - div.card:nth-of-type(2) hui-button-card
          selector: ha-card
          settle_ms: 100
      frames: 7   # ~0.5 s
    - interactions:
        - type: click
          root: 
            - div.card:nth-of-type(2) hui-button-card
          selector: ha-card
          settle_ms: 50
      frames: 3   # ~0.2 s
      click_circle: true
    - frames: 14   # ~1 s
    - interactions:
        - type: hover_away
      frames: 14   # ~1 s