id: doc_forge_config_entity_full
description: "Doc image: UIX forge with config entity full (forge.md)"
view_path: doc-forge-config-entity-full

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light

card:
  type: custom:uix-forge
  entity: light.bed_light
  forge:
    mold: card
    macros:
      state_color:
        params:
          - entity_id
        template: "{{ 'red' if is_state(entity_id, 'on') else 'green' }}"
    uix:
      style: |
        :host {
          --ha-card-border-radius: 20px;
          --ha-card-border-color: {{ state_color(config.entity) }};
          --ha-card-border-width: 3px;
        }
  element:
    type: tile
    entity: "{{ config.entity }}"
    name: "{{ device_name(config.entity) }} - {{ state_translated(config.entity) }}"
    uix:
      style: |
        span.primary {
          color: {{ state_color(config.entity) }};
        }

assertions: []

doc_animation:
  output: docs/source/assets/page-assets/forge/config-entity-full.png
  root: uix-forge
  padding: 16
  interval_ms: 66
  threshold: 0.02
  cursor: pointer
  segments:
    - interactions:
        - type: hover
          root: hui-tile-card
          selector: ha-tile-icon
          settle_ms: 0
      frames: 14   # ~1 s
    - interactions:
        - type: click
          root: hui-tile-card
          selector: ha-tile-icon
          settle_ms: 0
      frames: 3   # ~0.2 s
      click_circle: true
    - frames: 14   # ~1 s
    - interactions:
        - type: click
          root: hui-tile-card
          selector: ha-tile-icon
          settle_ms: 0
      frames: 3   # ~0.2 s
      click_circle: true