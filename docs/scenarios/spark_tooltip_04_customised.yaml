id: doc_spark_tooltip_customised
description: "Doc image: Forge Tooltip spark with custom styling (tooltip.md)"
view_path: doc-spark-tooltip-customised

setup:
  - type: ha_service
    domain: light
    service: turn_on
    entity_id: light.kitchen_lights
    brightness: 255

card:
  type: custom:uix-forge
  forge:
    mold: card
    sparks:
      - type: tooltip
        for: hui-tile-card $ ha-card
        content: Custom styled tooltip
  element:
    type: tile
    entity: light.kitchen_lights
    uix:
      style: |
        :host {
          --uix-tooltip-background-color: #333;
          --uix-tooltip-content-color: #fff;
          --uix-tooltip-border-radius: 999px;
        }

assertions: []

doc_animation:
  output: docs/source/assets/page-assets/forge/sparks/tooltip-customised.gif
  root: hui-tile-card
  padding: 32 16 16 16
  interval_ms: 66
  threshold: 0.02
  segments:
    - frames: 7   # ~0.5 s with entity on
    - interactions:
        - type: hover
          root: uix-forge
          selector: hui-tile-card
          settle_ms: 0
      frames: 22   # ~1.5 s with entity off
      cursor: pointer
    - interactions:
        - type: hover_away
      frames: 7   # ~0.5 s with entity on
      cursor: none