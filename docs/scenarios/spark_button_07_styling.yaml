id: doc_spark_button_styling
description: "Doc image: Forge Button spark styling (button.md)"
view_path: doc-spark-button-styling

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.kitchen_lights
      brightness: 255
  - type: ha_service
    domain: input_boolean
    service: turn_on
    data:
      entity_id: input_boolean.test_boolean

cards:
  - type: custom:uix-forge
    forge:
      mold: card
      grid_options:
        columns: 12
        rows: 1
      sparks:
        - type: tooltip
          for: hui-tile-card $ ha-button
          content: Toggle Special Switch
        - type: button
          after: hui-tile-card $ ha-tile-info
          label: Press me
          variant: neutral
          appearance: plain
          end_icon: mdi:test-tube
          entity: input_boolean.test_boolean
          tap_action:
            action: toggle
          hold_action:
            action: more-info
    element:
      type: tile
      entity: light.bed_light
      vertical: false
      features_position: bottom
      uix:
        style: |
          ha-tile-info {
            flex: 2;
          }
          ha-button {
            margin-top: -2px;
            flex: 1;
          }
  - type: custom:uix-forge
    forge:
      mold: card
      grid_options:
        columns: full
    element:
      type: tile
      entity: input_boolean.test_boolean

assertions: []

doc_animation:
  output: docs/source/assets/page-assets/forge/sparks/button-styling.gif
  root: hui-grid-section
  padding: 32 16 16 16
  interval_ms: 66
  threshold: 0.02
  cursor: pointer
  segments:
    - frames: 14   # ~1 s
    - interactions:
        - type: hover
          root: 
            - uix-forge
            - hui-tile-card
          selector: ha-button
          settle_ms: 100
      frames: 7   # ~0.5 s
    - interactions:
        - type: click
          root: 
            - uix-forge
            - hui-tile-card
          selector: ha-button
          settle_ms: 50
      frames: 3   # ~0.2 s
      click_circle: true
    - frames: 14   # ~1 s
    - interactions:
        - type: click
          root: 
            - uix-forge
            - hui-tile-card
          selector: ha-button
          settle_ms: 50
      frames: 3   # ~0.2 s
      click_circle: true
    - frames: 14   # ~1 s
    - interactions:
        - type: hover_away
      frames: 14   # ~1 s