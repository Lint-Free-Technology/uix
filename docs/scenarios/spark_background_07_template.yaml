id: doc_background_spark_template
description: "Doc image: Forge Background spark with template (background.md)"
view_path: doc-spark-background-template

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light
      brightness: 255

card:
  type: custom:uix-forge
  forge:
    mold: card
    sparks:
      - type: background
        for: hui-tile-card $ ha-card
        background:
          color: >-
            {% if is_state(config.element.entity, 'on') %}
              rgba(255, 200, 0, 0.4)
            {% else %}
              rgba(100, 100, 100, 0.2)
            {% endif %}
  element:
    type: tile
    entity: light.bed_light

assertions: []

doc_animation:
  output: docs/source/assets/page-assets/forge/sparks/background-template.gif
  root: uix-forge
  padding: 16
  interval_ms: 66
  threshold: 0.02
  cursor: pointer
  segments:
    - interactions:
        - type: hover
          root: hui-tile-card
          selector: ha-tile-icon
          settle_ms: 0
      frames: 14   # ~1 s
    - interactions:
        - type: click
          root: hui-tile-card
          selector: ha-tile-icon
          settle_ms: 0
      frames: 3   # ~0.2 s
      click_circle: true
    - frames: 14   # ~1 s
    - interactions:
        - type: click
          root: hui-tile-card
          selector: ha-tile-icon
          settle_ms: 0
      frames: 3   # ~0.2 s
      click_circle: true