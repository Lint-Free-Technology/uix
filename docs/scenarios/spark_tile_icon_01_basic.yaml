id: doc_spark_tile_icon_basic
description: "Doc image: Forge Background spark (tile-icon.md)"
view_path: doc-spark-tile-icon-basic

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light
      brightness: 255

card:
  type: custom:uix-forge
  forge:
    mold: card
    sparks:
      - type: tile-icon
        before: hui-tile-card $ ha-tile-icon:not([data-uix-forge-tile-icon-id])
        icon: mdi:star
        color: red
  element:
    type: tile
    entity: light.bed_light

assertions: []

doc_image:
  output: docs/source/assets/page-assets/forge/sparks/tile-icon-basic.png
  root: hui-tile-card
  padding: 16