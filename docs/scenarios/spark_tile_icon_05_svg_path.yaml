id: doc_spark_tile_icon_svg_path
description: "Doc image: Forge Tile Icon spark SVG path (tile-icon.md)"
view_path: doc-spark-tile-icon-svg-path

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light
      brightness: 255

card:
  type: custom:uix-forge
  forge:
    mold: card
    sparks:
      - type: tile-icon
        after: hui-tile-card $ ha-tile-icon
        icon_path: "M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"
        color: red
  element:
    type: tile
    entity: light.bed_light

assertions: []

doc_image:
  output: docs/source/assets/page-assets/forge/sparks/tile-icon-svg-path.png
  root: hui-tile-card
  padding: 16