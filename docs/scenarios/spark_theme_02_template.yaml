id: doc_spark_theme_template
description: "Doc image:: Theme spark template usage (theme.md)"
view_path: doc-spark-theme-template

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light
      brightness: 255

card:
  type: "custom:uix-forge"
  forge:
    mold: card
    sparks:
      - type: theme
        for: element
        theme: "{{ 'uix-doc-spark-theme-template-red' if is_state(config.element.entity, 'on') else 'uix-doc-spark-theme-template-blue' }}"
  element:
    type: tile
    entity: light.bed_light

doc_animation:
  output: docs/source/assets/page-assets/forge/sparks/theme-template.gif
  root: uix-forge
  padding: 16
  interval_ms: 66
  threshold: 0.02
  cursor: pointer
  segments:
    - frames: 14   # ~1 s
    - interactions:
        - type: hover
          root: 
            - uix-forge
            - hui-tile-card
          selector: ha-tile-icon
          settle_ms: 100
      frames: 7   # ~0.5 s
    - interactions:
        - type: click
          root: 
            - uix-forge
            - hui-tile-card
          selector: ha-tile-icon
          settle_ms: 50
      frames: 3   # ~0.2 s
      click_circle: true
    - frames: 14   # ~1 s
    - interactions:
        - type: click
          root: 
            - uix-forge
            - hui-tile-card
          selector: ha-tile-icon
          settle_ms: 50
      frames: 3   # ~0.2 s
      click_circle: true
    - frames: 14   # ~1 s
    - interactions:
        - type: hover_away
      frames: 14   # ~1 s