id: doc_spark_button_basic
description: "Doc image: Forge Button spark (button.md)"
view_path: doc-spark-button-basic

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light
      brightness: 255

card:
  type: custom:uix-forge
  forge:
    mold: card
    sparks:
      - type: button
        after: hui-tile-card $ ha-tile-icon
        label: Toggle
        entity: light.bed_light
        tap_action:
          action: toggle
  element:
    type: tile
    entity: light.bed_light

assertions: []

doc_animation:
  output: docs/source/assets/page-assets/forge/sparks/button-basic.gif
  root: hui-tile-card
  padding: 16
  interval_ms: 66
  threshold: 0.02
  cursor: pointer
  segments:
    - frames: 14   # ~1 s
    - interactions:
        - type: hover
          root: 
            - uix-forge
            - hui-tile-card
          selector: ha-button
          settle_ms: 100
      frames: 7   # ~0.5 s
    - interactions:
        - type: click
          root: 
            - uix-forge
            - hui-tile-card
          selector: ha-button
          settle_ms: 50
      frames: 3   # ~0.2 s
      click_circle: true
    - frames: 14   # ~1 s
    - interactions:
        - type: click
          root: 
            - uix-forge
            - hui-tile-card
          selector: ha-button
          settle_ms: 50
      frames: 3   # ~0.2 s
      click_circle: true
    - frames: 14   # ~1 s
    - interactions:
        - type: hover_away
      frames: 14   # ~1 s