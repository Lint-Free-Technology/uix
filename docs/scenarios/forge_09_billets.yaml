id: doc_forge_billets
description: "Doc image: basic element forging with UIX Forge billets (forge.md)"
view_path: doc-forge-billets

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light
      brightness: 181

card:
  type: custom:uix-forge
  entity: light.bed_light
  forge:
    mold: card
    grid_options:
      columns: 7
    billets:
      my_color: teal
      max_brightness: 255
      tags:
        - living_room
        - ambient
  element:
    type: tile
    entity: "{{ config.entity }}"
    name: "{{ my_color | capitalize }} light"
    tap_action:
      action: perform-action
      perform_action: light.turn_on
      target:
        entity_id: "{{ config.entity }}"
      data:
        brightness: "{{ max_brightness }}"
    uix:
      style: |
        ha-card {
          --tile-color: {{ my_color }} !important;
        }
        ha-tile-info span:nth-of-type(2):after {
        {%- if is_state_attr(config.entity, 'brightness', max_brightness) -%}
          content: ' - {{ tags | join(', ') }} - MAX';
          font-weight: 900;
        {%- else -%}
          content: ' - {{ tags | join(', ') }}';
        {% endif -%}
        }

assertions: []

doc_animation:
  output: docs/source/assets/page-assets/forge/billets.gif
  root: uix-forge
  padding: 16
  interval_ms: 66
  threshold: 0.02
  cursor: pointer
  segments:
    - interactions:
        - type: hover
          root: hui-tile-card
          selector: ha-card
          settle_ms: 0
      frames: 14   # ~1 s
    - interactions:
        - type: click
          root: hui-tile-card
          selector: ha-card
          settle_ms: 0
      frames: 3   # ~0.2 s
      click_circle: true
    - frames: 7  # ~0.5 s
    - interactions:
        - type: hover_away
      frames: 28   # ~2 s