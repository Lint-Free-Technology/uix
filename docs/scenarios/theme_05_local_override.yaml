id: doc_theme_local_override
description: "Doc image: red theme with teal/purple entity row classes plus local override (themes.md)"
view_path: doc-theme-local-override
theme: uix-doc-row-red

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light
  - type: ha_service
    domain: light
    service: turn_off
    data:
      entity_id: light.ceiling_lights
  - type: ha_service
    domain: light
    service: turn_off
    data:
      entity_id: light.kitchen_lights

card:
  type: entities
  title: Lights
  entities:
    - entity: light.bed_light
    - entity: light.ceiling_lights
    - entity: light.kitchen_lights
      uix:
        theme: uix-doc-row-blue-override
assertions: []

doc_image:
  output: docs/source/assets/page-assets/using/theme-local-override.png
  root: hui-entities-card
  padding: 16
  threshold: 0.02
