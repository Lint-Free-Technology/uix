id: doc_forge_uix_styling
description: "Doc image: UIX Forge styling with UIX styling (forge.md)"
view_path: doc-forge-uix-styling

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light

card:
  type: custom:uix-forge
  forge:
    mold: card
    uix:
      style: |
        :host {
          --ha-card-border-radius: 50px;
        }
  element:
    type: tile
    entity: light.bed_light

assertions: []

doc_image:
  output: docs/source/assets/page-assets/forge/uix-styling.png
  root: uix-forge
  padding: 16