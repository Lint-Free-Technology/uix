id: doc_spark_background_camera
description: "Doc image: Forge Background spark camera (background.md)"
view_path: doc-spark-background-camera

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light
      brightness: 255
    settle_ms: 2000

card:
  type: custom:uix-forge
  forge:
    mold: card
    grid_options:
      columns: 12
      rows: 6
    sparks:
      - type: background
        for: hui-button-card $ ha-card
        camera_entity: camera.demo_camera
        camera_zoom: 1.3
        camera_position: bottom-left
  element:
    type: button
    entity: light.bed_light

assertions: []

doc_image:
  output: docs/source/assets/page-assets/forge/sparks/background-camera.png
  root: hui-button-card
  padding: 16
  threshold: 1 # high threshold as camera feed can be slightly different on each run due to timing