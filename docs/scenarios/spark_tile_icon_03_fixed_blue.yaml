id: doc_spark_tile_icon_fixed_blue
description: "Doc image: Forge Tile Icon spark fixed blue (tile-icon.md)"
view_path: doc-spark-tile-icon-fixed-blue

setup:
  - type: ha_service
    domain: light
    service: turn_on
    data:
      entity_id: light.bed_light
      brightness: 255

card:
  type: custom:uix-forge
  forge:
    mold: card
    sparks:
      - type: tile-icon
        after: hui-tile-card $ ha-tile-icon
        icon: mdi:chevron-right
        color: blue
  element:
    type: tile
    entity: light.bed_light

assertions: []

doc_image:
  output: docs/source/assets/page-assets/forge/sparks/tile-icon-fixed-blue.png
  root: hui-tile-card
  padding: 16